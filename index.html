<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiro 工作坊</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Noto Sans TC',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8f9fa;color:#2d3436;line-height:1.8;padding:60px 20px}
        .container{max-width:720px;margin:0 auto;text-align:center}
        h1{font-size:2.2rem;margin-bottom:8px}
        .subtitle{color:#636e72;font-size:1rem;margin-bottom:48px}
        .course-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:24px;text-align:left}
        .course-card{background:#fff;border-radius:16px;padding:32px;box-shadow:0 2px 12px rgba(0,0,0,0.06);border:2px solid transparent;transition:all 0.2s;text-decoration:none;color:inherit;display:block}
        .course-card:hover{border-color:#6c5ce7;box-shadow:0 4px 20px rgba(108,92,231,0.15);transform:translateY(-2px);text-decoration:none}
        .course-icon{font-size:2.5rem;margin-bottom:12px}
        .course-card h2{font-size:1.2rem;margin-bottom:8px;color:#2d3436}
        .course-card p{font-size:0.9rem;color:#636e72}
        .course-badge{display:inline-block;background:#6c5ce7;color:#fff;padding:3px 12px;border-radius:20px;font-size:0.75rem;margin-top:12px}
        .footer{margin-top:60px;font-size:0.85rem;color:#b2bec3}
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Kiro 工作坊</h1>
        <p class="subtitle">用 AI 提升工作效率，從零開始學會使用 Kiro IDE</p>

        <div class="course-grid">
            <a href="kiro-ide/" class="course-card">
                <div class="course-icon">🖥️</div>
                <h2>Kiro IDE 入門</h2>
                <p>從安裝到實戰，學會用 Kiro IDE 搭配 MCP 搜尋工具、Skill 和瀏覽器自動化，完成品牌分析報告。</p>
                <span class="course-badge">6 個單元</span>
            </a>

            <a href="kiro-cli/" class="course-card">
                <div class="course-icon">⌨️</div>
                <h2>Kiro CLI 自動化</h2>
                <p>用 Kiro 的 CLI 模式打造自動化工作流，從詩詞生成到排程執行，體驗 Headless AI 的威力。</p>
                <span class="course-badge">實戰課程</span>
            </a>
        </div>

        <p class="footer">© 2026 Kiro Workshop</p>
    </div>
</body>
</html>
